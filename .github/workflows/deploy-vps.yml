name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Validar secrets do deploy
        shell: bash
        run: |
          set -euo pipefail
          for key in VPS_HOST VPS_USER VPS_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error title=Secret ausente::$key nao esta configurado nos secrets do repositorio."
              exit 1
            fi
          done

      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/projeto-fivem
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            bash deploy/vps/deploy.sh
